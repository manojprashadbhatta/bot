<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroShield AI Hub</title>
    <style>
        :root {
            --bg-dark: #05050a;
            --panel-bg: rgba(10, 10, 20, 0.8);
            --neon-cyan: #00f2fe;
            --neon-magenta: #fe019a;
            --text-white: #ffffff;
            --text-dim: #707590;
            --bot-bubble: rgba(0, 242, 254, 0.08);
            --user-bubble: rgba(254, 1, 154, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #120e2e 0%, #05050a 100%);
        }

        #chat-container {
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            border: none;
            position: relative;
        }

        @media (min-width: 640px) {
            #chat-container {
                height: 85vh;
                border-radius: 16px;
                border: 2px solid var(--neon-cyan);
                box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 15px rgba(0, 242, 254, 0.1);
            }
        }

        header {
            padding: 22px;
            text-align: center;
            background: rgba(5, 5, 10, 0.6);
            border-bottom: 2px solid var(--neon-magenta);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-magenta);
            font-size: 1.1rem;
        }

        header span {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        #chat-box {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .msg-bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
            color: #e0f7fa;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid var(--neon-magenta);
            box-shadow: 0 0 10px rgba(254, 1, 154, 0.1);
            color: #fce4ec;
        }

        #input-area {
            display: flex;
            padding: 20px;
            background: rgba(5, 5, 10, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            gap: 12px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 6px;
            border: 1px solid var(--text-dim);
            background: rgba(0, 0, 0, 0.4);
            color: var(--text-white);
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        #user-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
        }

        #send-btn {
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--text-white);
            border-radius: 6px;
            width: 50px;
            height: 46px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 8px rgba(254, 1, 154, 0.2);
        }

        #send-btn:hover {
            background: var(--neon-magenta);
            box-shadow: 0 0 15px var(--neon-magenta);
            transform: translateY(-1px);
        }

        /* Scrollbar Core Customization */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 2px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <header>⚡ <span>MicroShield</span> AI ⚡</header>
        <div id="chat-box">
            <div class="msg-bubble bot-msg">Hello! 😊 How is everything going on?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Query system security state..." autocomplete="off">
            <button id="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script src="main.js" defer></script>
</body>
</html>
